<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dota Stats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Dota Stats</h1>
    <div class="search">
        <input type="text" id="playerInput" placeholder="Введите Steam ID или ник">
        <button id="searchBtn">Найти</button>
    </div>
</header>

<main>

<section class="player-card">
    <img id="avatar" src="" alt="avatar">
    <div class="player-info">
        <h2 id="playerName">Игрок</h2>
        <p id="mmr">MMR: -</p>
    </div>
</section>

<section class="stats">
    <div class="stat">
        <h3>Матчи</h3>
        <p id="matches">0</p>
    </div>

    <div class="stat">
        <h3>Победы</h3>
        <p id="wins">0</p>
    </div>

    <div class="stat">
        <h3>Винрейт</h3>
        <p id="winrate">0%</p>
    </div>
</section>

<section class="matches">
    <h2>Последние матчи</h2>
    <div id="matchesList"></div>
</section>

</main>

<script src="app.js"></script>
</body>
</html>
